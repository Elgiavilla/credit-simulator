name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: credit-simulator

jobs:

  # ------------------------------------------------------------------------------------------------
  # Build and test. Runs on every push and every pull request, including the ones that will never be
  # merged -- a test suite that only runs on main tells you about breakage after it is already there.
  # ------------------------------------------------------------------------------------------------
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn -B clean compile

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B package -DskipTests

      # Proof that the artefact actually runs, not merely that it compiled. A green build that
      # produces a jar nobody has executed is a green build that means very little: this feeds input
      # through the real jar and fails the pipeline if the golden figure is not there.
      #
      # Note the explicit 'calculate' line. Piped stdin is raw input to the command loop, so the
      # command has to be given. A file passed as an ARGUMENT goes through InputScript, which infers
      # 'calculate' when the file opens with a loan field instead of a command -- that path is
      # covered by the launcher smoke test below. The asymmetry is documented in the README.
      - name: Smoke test the jar against the reference calculation
        run: |
          set -euo pipefail
          OUTPUT="$(printf 'calculate\nMobil\nBekas\n2020\n100000000\n3\n25000000\nexit\n' \
            | java -jar target/credit-simulator.jar)"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -F 'tahun 1 : Rp. 2,250,000.00/bln , Suku Bunga : 8%'
          echo "$OUTPUT" | grep -F 'tahun 2 : Rp. 2,432,250.00/bln , Suku Bunga : 8,1%'
          echo "$OUTPUT" | grep -F 'tahun 3 : Rp. 2,641,423.50/bln , Suku Bunga : 8,6%'

      # The other supported invocation: a file as an argument, containing a bare loan form.
      - name: Smoke test the launcher script and file input
        run: |
          set -euo pipefail
          chmod +x credit_simulator bin/credit_simulator
          ./credit_simulator file_inputs.txt    | grep -F 'tahun 1 : Rp. 2,250,000.00/bln'
          bin/credit_simulator file_inputs.txt  | grep -F 'tahun 3 : Rp. 2,641,423.50/bln'

      - name: Publish the test report
        uses: actions/upload-artifact@v4
        if: always()   # the reports are most useful precisely when the build failed
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload the jar
        uses: actions/upload-artifact@v4
        with:
          name: credit-simulator-jar
          path: target/credit-simulator.jar

  # ------------------------------------------------------------------------------------------------
  # Publish to Docker Hub. Gated on `build`, and only on main or a tag: a pull request from a fork
  # must never be able to push an image, and `needs: build` means a red test suite cannot ship.
  # ------------------------------------------------------------------------------------------------
  docker:
    name: Publish image to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}   # an access token, never the account password

      - name: Work out the tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max